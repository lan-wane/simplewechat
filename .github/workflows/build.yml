name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build APK with Kivy Docker
        run: |
          docker run --rm -v "$(pwd)":/app kivy/buildozer:latest buildozer android debug