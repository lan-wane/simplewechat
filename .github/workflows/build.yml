name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openjdk-17-jdk ant git zip unzip autoconf automake libtool pkg-config libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-dev ccache
      
      - name: Install Buildozer
        run: |
          pip install --upgrade pip wheel setuptools
          pip install Cython==0.29.33
          pip install buildozer==1.4.0
      
      - name: Build APK
        run: |
          buildozer android debug --verbose 2>&1 || true
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simplewechat-apk
          path: bin/*.apk
          if-no-files-found: warn
