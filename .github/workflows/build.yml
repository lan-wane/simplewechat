      - name Buid APK
        run: --verbose 2>&1 || true
              python-version: '3.9'
      
        if: hashFiles('bin/*.apk') != ''
      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get in zip unzip \
            autoconf automake libtool pkg-config \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev python3-dev \
            ccache
            
      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
      
      - name: Install Buildozer
        run: |
          pip install --upgrade pip wheel setuptools
          pip install Cython==0.29.33
          pip install buildozer==1.4.0
      
      - name: Build APK
        run: |
          buildozer android debug --verbose 2>&1 || true
          
      - name: Check build output
        run: |
          ls -la bin/ 2>/dev/null || echo "No bin directory"
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"
          
      - name: Upload APK
        if: hashFiles('bin/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: simplewechat-apk
          path: bin/*.apk